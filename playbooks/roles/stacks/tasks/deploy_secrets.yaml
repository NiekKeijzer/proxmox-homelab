---

- debug:
    msg: "{{ stack_dir }}/docker-compose.yaml"

- name: Read docker-compose.yaml
  slurp:
    src: "{{ stack_dir }}/docker-compose.yaml"
  delegate_to: localhost
  become: false
  register: compose_file_raw

- name: Parse docker-compose.yaml
  set_fact:
    compose_content: "{{ compose_file_raw.content | b64decode | from_yaml }}"

- name: Extract secrets per service
  set_fact:
    service_secrets: >-
      {{
        service_secrets | default({}) | combine({
          item.key: (
            item.value.secrets | default([])
            | map('regex_replace', '^([a-zA-Z0-9_-]+):?.*$', '\1')
            | select('string')
            | unique
            | list
          )
        })
      }}
  loop: "{{ compose_content.services | dict2items }}"
  no_log: true
  when: compose_content.services is defined

- name: Build fnox key lookup list with mapping
  set_fact:
    fnox_lookups: "{{ fnox_lookups | default([]) + [lookup_item] }}"
    fnox_to_secret_map: "{{ fnox_to_secret_map | default({}) | combine({lookup_key: {'secret': secret_item, 'service': service_name}}) }}"
  loop: "{{ service_secrets | dict2items | subelements('value', skip_missing=True) }}"
  vars:
    service_name: "{{ item.0.key }}"
    secret_item: "{{ item.1 }}"
    lookup_key: "{{ (service_name ~ '_' ~ secret_item) | upper }}"
    lookup_item: "{{ lookup_key }}"

- name: Fetch secrets from fnox (locally)
  shell: "fnox get {{ item }}"
  register: fnox_results
  loop: "{{ fnox_lookups | unique }}"
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  no_log: true
  when: fnox_lookups is defined and fnox_lookups | length > 0

- name: Build secrets dictionary with service info
  set_fact:
    stack_secrets: >-
      {{
        stack_secrets | default([]) + [{
          'secret_name': fnox_to_secret_map[item.item].secret,
          'service_name': fnox_to_secret_map[item.item].service,
          'value': item.stdout
        }]
      }}
  loop: "{{ fnox_results.results }}"
  when: 
    - item.rc == 0
    - fnox_to_secret_map[item.item] is defined
  no_log: true

- name: Check for missing secrets
  set_fact:
    missing_secrets: >-
      {{
        fnox_lookups | unique | 
        difference(fnox_results.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | list)
      }}
  when: fnox_lookups is defined

- name: Warn about missing secrets
  debug:
    msg: "WARNING: Could not retrieve these secrets from fnox: {{ missing_secrets }}"
  when: 
    - missing_secrets is defined
    - missing_secrets | length > 0

- name: Fail if critical secrets are missing
  fail:
    msg: "Failed to retrieve required secrets: {{ missing_secrets }}"
  when: 
    - missing_secrets is defined
    - missing_secrets | length > 0
    - fail_on_missing_secrets | default(true)

- name: Create stack directory on VM
  file:
    path: "{{ stack_vm_dir }}"
    state: directory
    mode: '0755'

- name: Get list of unique services with secrets
  set_fact:
    services_with_secrets: "{{ stack_secrets | map(attribute='service_name') | unique | list }}"
  when: stack_secrets is defined

- name: Create secrets directory per service on VM
  file:
    path: "{{ stack_vm_dir }}/secrets/{{ item }}"
    state: directory
    mode: '0700'
  loop: "{{ services_with_secrets }}"
  when: services_with_secrets is defined

- name: Copy docker-compose.yaml to VM
  copy:
    src: "{{ stack_dir }}/docker-compose.yaml"
    dest: "{{ stack_vm_dir }}/docker-compose.yaml"
    mode: '0644'

- name: Copy additional files if present
  copy:
    src: "{{ item }}"
    dest: "{{ stack_vm_dir }}/{{ item | basename }}"
    mode: '0644'
  with_fileglob:
    - "{{ stack_dir }}/*"
  when: item != stack_dir + '/docker-compose.yaml'

- name: Write secret files to VM per service
  copy:
    content: "{{ item.value }}"
    dest: "{{ stack_vm_dir }}/secrets/{{ item.service_name }}/{{ item.secret_name }}"
    mode: '0600'
  loop: "{{ stack_secrets }}"
  no_log: true
  when: stack_secrets is defined